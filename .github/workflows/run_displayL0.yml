name: Run displayL0

on:
  push:
    paths:
      - 'displayL0.py'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install bokeh numpy

      - name: Run displayL0.py
        run: python displayL0.py

      - name: Commit generated files
        run: |
          git config user.name "gisilves (via github-actions)"
          git config user.email "gianluigi.silvestre@pg.infn.it"
          git add *.html *_TB_hits.csv *_nominal_positions.csv
          git diff --cached --quiet || git commit -m "Auto-generate detector layout HTML and TB hits CSV"
          git push